##
## Experiment 1 — Pod Delete (Northeast Sector)
## ─────────────────────────────────────────────
## Scenario: "A grid controller instance disappears unexpectedly."
##
## Probe: ne-pod-delete-health-probe
##   Continuously checks the NE sector healthz endpoint.
##   Validates the sector recovers after pod deletion.
##
## Usage:
##   kubectl apply -f k8s/engine-northeast-pod-delete.yml
##
## Cleanup:
##   kubectl delete chaosengine grid-northeast-pod-delete -n smeal-day
##

apiVersion: litmuschaos.io/v1alpha1
kind: ChaosEngine
metadata:
  name: grid-northeast-pod-delete
  namespace: smeal-day
  labels:
    context: grid-sector-northeast
    experiment: pod-delete
spec:
  engineState: "active"
  annotationCheck: "false"
  appinfo:
    appns: smeal-day
    applabel: "app=grid-sector-northeast"
    appkind: deployment
  chaosServiceAccount: litmus-admin
  experiments:
    - name: pod-delete
      spec:
        components:
          env:
            ## Duration of chaos (seconds)
            - name: TOTAL_CHAOS_DURATION
              value: "60"
            ## Interval between successive pod deletions (seconds)
            - name: CHAOS_INTERVAL
              value: "10"
            ## Graceful termination (false = force kill)
            - name: FORCE
              value: "false"
        probe:
          - name: "ne-pod-delete-health-probe"
            type: "httpProbe"
            mode: "Edge"
            httpProbe/inputs:
              url: "http://grid-sector-northeast.smeal-day.svc.cluster.local:3000/healthz"
              insecureSkipVerify: false
              method:
                get:
                  criteria: "=="
                  responseCode: "200"
            runProperties:
              probeTimeout: "5s"
              interval: "5s"
              retry: 3
              probePollingInterval: "2s"
