##
## Power Grid Sector Services — smeal-day namespace
## Each sector is an independent deployment + NodePort service.
## Litmus chaos targets these individually.
##

# ─── NORTHEAST ───────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grid-sector-northeast
  namespace: smeal-day
  labels:
    app: grid-sector-northeast
    grid-sector: northeast
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grid-sector-northeast
  template:
    metadata:
      labels:
        app: grid-sector-northeast
        grid-sector: northeast
    spec:
      containers:
        - name: grid-service
          image: grid-sector-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: SECTOR_NAME
              value: northeast
          readinessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: grid-sector-northeast
  namespace: smeal-day
  labels:
    app: grid-sector-northeast
spec:
  type: NodePort
  selector:
    app: grid-sector-northeast
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30081

