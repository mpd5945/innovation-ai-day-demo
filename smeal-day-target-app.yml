apiVersion: apps/v1
kind: Deployment
metadata:
  name: wmata-ops-control
  namespace: smeal-day
  labels:
    app: wmata-ops-control
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wmata-ops-control
  template:
    metadata:
      labels:
        app: wmata-ops-control
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: wmata-ops-control
  namespace: smeal-day
  labels:
    app: wmata-ops-control
spec:
  selector:
    app: wmata-ops-control
  ports:
    - name: http
      port: 80
      targetPort: 80
